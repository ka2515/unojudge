<!-- 計算方塊版 -->
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>114資科賽測試系統</title>

  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly/javascript.min.js"></script>
  <script src="https://unpkg.com/blockly/msg/zh-hant.js"></script>

  <style>
    body { font-family: sans-serif; margin: 18px; }
    h2 { margin: 0 0 10px 0; }
    .layout { display:flex; gap:16px; align-items:flex-start; }
    .main { flex: 1; max-width: 900px; }
    .side { width: 320px; border:1px solid #ddd; border-radius:12px; padding:12px; }
    .box { border: 1px solid #ddd; padding: 14px; border-radius: 12px; }
    .row { display:flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    /* ✅ 放大 1.5 倍 */
    select, input[type="file"], button, input[type="email"], input[type="password"] {
      font-size: 21px; /* 約 14 * 1.5 */
      padding: 9px 10px;
    }

    button { cursor:pointer; }
    .score { font-size: 24px; margin-top: 14px; }
    .ok { color: #0a7; }
    .bad { color: #c22; }
    .warn { color: #b58900; } /* ★黃字 */
    .hint { color: #444; font-size: 14px; margin-top: 8px; }
    .muted { color: #777; }
    .card { border-radius: 12px; padding: 14px; margin-top: 14px; }
    .card.wait { background: #f5f5f5; }
    .card.ok { background: #eafff4; border: 1px solid #8ddfc1; }
    .card.bad { background: #fff0f0; border: 1px solid #f1a1a1; }

    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; }
    .pill { border:1px solid #ddd; border-radius:999px; padding:4px 10px; font-size:14px; }
    .list { margin:0; padding-left: 20px; }
    .list li { margin: 6px 0; }

    /* ★右側分區外觀 */
    .zone { border:1px solid #eee; border-radius:12px; padding:10px; margin-top:10px; }
    .zone-title { font-weight:700; margin-bottom:6px; }
    .zone-empty { color:#777; font-size: 14px; margin: 6px 0; }

    /* login modal */
    .modal-bg {
      position:fixed; inset:0; background: rgba(0,0,0,.35);
      display:none; align-items:center; justify-content:center;
    }
    .modal {
      width: min(520px, 92vw);
      background: #fff; border-radius: 14px; padding: 14px; border: 1px solid #ddd;
    }
    .modal h3 { margin: 0 0 10px 0; }
    .modal .row2 { display:flex; flex-direction:column; gap:10px; }
  </style>
</head>
<body>

<div class="topbar">
  <h2>114資科賽測試系統</h2>
  <div>
    <span id="me" class="pill muted">尚未登入</span>
    <button id="btnLogin">登入</button>
    <button id="btnChangePwd" style="display:none;">更改密碼</button>
    <button id="btnAdmin" style="display:none;">後台</button>
    <button id="btnLogout" style="display:none;">登出</button>
  </div>
</div>

<div class="layout">
  <div class="main">
    <div class="box">
      <div class="row">
        <div>
          <label for="problemSelect"><b>選擇題目：</b></label>
          <select id="problemSelect" disabled>
            <option>載入題目清單中…</option>
          </select>
        </div>

        <div>
          <input type="file" id="fileInput" accept=".m5,.xml" disabled />
        </div>
      </div>

      <div class="hint muted">
        操作方式：登入 → 選題目 → 上傳 .m5（選檔後自動評分）
      </div>

      <div id="resultCard" style="display:none;">
        <div class="score" id="score"></div>
        <div id="details"></div>
      </div>
    </div>
  </div>

  <div class="side">
    <div style="font-weight:700; margin-bottom:8px;">我的題目進度</div>
    <div class="muted" id="sideInfo">（請先登入）</div>

    <!-- ★改版：用分區顯示 -->
<div class="zone">
  <div class="zone-title">第 1 區</div>
  <ul class="list" id="zone1"></ul>
  <div class="zone-empty" id="zone1Empty" style="display:none;">（尚無題目）</div>
</div>

<div class="zone">
  <div class="zone-title">第 2 區</div>
  <ul class="list" id="zone2"></ul>
  <div class="zone-empty" id="zone2Empty" style="display:none;">（尚無題目）</div>
</div>

<div class="zone">
  <div class="zone-title">第 3 區</div>
  <ul class="list" id="zone3"></ul>
  <div class="zone-empty" id="zone3Empty" style="display:none;">（尚無題目）</div>
</div>

<div class="zone">
  <div class="zone-title">第 4 區</div>
  <ul class="list" id="zone4"></ul>
  <div class="zone-empty" id="zone4Empty" style="display:none;">（尚無題目）</div>
</div>

<div class="zone">
  <div class="zone-title">第 5 區</div>
  <ul class="list" id="zone5"></ul>
  <div class="zone-empty" id="zone5Empty" style="display:none;">（尚無題目）</div>
</div>


<!-- Login Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>登入</h3>
    <div class="row2">
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="username" />
      <input id="loginPwd" type="password" placeholder="密碼" autocomplete="current-password" />
      <button id="btnDoLogin">登入</button>
      <div class="muted" id="loginMsg"></div>
    </div>
  </div>
</div>

<!-- Change Password Modal -->
<div class="modal-bg" id="pwdModalBg">
  <div class="modal">
    <h3>更改密碼</h3>
    <div class="row2">
      <input id="oldPwd" type="password" placeholder="舊密碼" autocomplete="current-password" />
      <input id="newPwd" type="password" placeholder="新密碼（至少 6 碼）" autocomplete="new-password" />
      <input id="newPwd2" type="password" placeholder="再次輸入新密碼" autocomplete="new-password" />
      <button id="btnDoChangePwd">確認更改</button>
      <div class="muted" id="pwdMsg"></div>
    </div>
  </div>
</div>

<script>
  try { Blockly.setLocale(Blockly.Msg); } catch (e) {}

  const BASE_URL = "";
  //const BASE_URL = "https://m5-grader-588020858950.asia-east1.run.app";
  const problemSelect = document.getElementById("problemSelect");
  const fileInput = document.getElementById("fileInput");
  const scoreEl = document.getElementById("score");
  const detailsEl = document.getElementById("details");
  const resultCard = document.getElementById("resultCard");
  const meEl = document.getElementById("me");
  const btnLogin = document.getElementById("btnLogin");
  const btnChangePwd = document.getElementById("btnChangePwd");
  const btnLogout = document.getElementById("btnLogout");
  const modalBg = document.getElementById("modalBg");
  const loginEmail = document.getElementById("loginEmail");
  const loginPwd = document.getElementById("loginPwd");
  const btnDoLogin = document.getElementById("btnDoLogin");
  const loginMsg = document.getElementById("loginMsg");
  const sideInfo = document.getElementById("sideInfo");
  const pwdModalBg = document.getElementById("pwdModalBg");
  const oldPwd = document.getElementById("oldPwd");
  const newPwd = document.getElementById("newPwd");
  const newPwd2 = document.getElementById("newPwd2");
  const btnDoChangePwd = document.getElementById("btnDoChangePwd");
  const pwdMsg = document.getElementById("pwdMsg");
  const btnAdmin = document.getElementById("btnAdmin");

  // ★右側改版 DOM
  const zone1 = document.getElementById("zone1");
  const zone2 = document.getElementById("zone2");
  const zone3 = document.getElementById("zone3");
  const zone4 = document.getElementById("zone4");
  const zone5 = document.getElementById("zone5");

  const zone1Empty = document.getElementById("zone1Empty");
  const zone2Empty = document.getElementById("zone2Empty");
  const zone3Empty = document.getElementById("zone3Empty");
  const zone4Empty = document.getElementById("zone4Empty");
  const zone5Empty = document.getElementById("zone5Empty");

  function openPwdModal() {
    pwdMsg.textContent = "";
    oldPwd.value = "";
    newPwd.value = "";
    newPwd2.value = "";
    pwdModalBg.style.display = "flex";
    oldPwd.focus();
  }

  function closePwdModal() {
    pwdModalBg.style.display = "none";
  }

  function setAdminUI(role) {
    if (role === "admin") btnAdmin.style.display = "inline-block";
    else btnAdmin.style.display = "none";
  }

  btnChangePwd.addEventListener("click", openPwdModal);

  pwdModalBg.addEventListener("click", (e) => {
    if (e.target === pwdModalBg) closePwdModal();
  });

  btnDoChangePwd.addEventListener("click", async () => {
    try {
      pwdMsg.textContent = "處理中…";

      const a = oldPwd.value;
      const b = newPwd.value;
      const c = newPwd2.value;

      if (!a || !b || !c) throw new Error("請填寫完整");
      if (b.length < 6) throw new Error("新密碼至少 6 碼");
      if (b !== c) throw new Error("兩次新密碼不一致");

      const resp = await api("/auth/change-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ oldPassword: a, newPassword: b }),
      });

      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data?.error || "更改失敗");

      pwdMsg.textContent = "✅ 更改成功";
      setTimeout(() => closePwdModal(), 500);
    } catch (e) {
      pwdMsg.textContent = "❌ " + (e?.message || e);
    }
  });

  // ===== token =====
  function getToken() { return localStorage.getItem("token") || ""; }
  function setToken(t) { localStorage.setItem("token", t); }
  function clearToken() { localStorage.removeItem("token"); }

  async function api(path, options = {}) {
    const headers = options.headers || {};
    const token = getToken();
    if (token) headers["Authorization"] = "Bearer " + token;
    return fetch(BASE_URL + path, { ...options, headers });
  }

  // ===== Blockly: m5 XML -> JS =====
  function getJSGenerator() {
    return Blockly.JavaScript || Blockly.javascriptGenerator;
  }
  function patchGenerators(JS) {
    JS["text_print"] = function (block) {
      const msg = JS.valueToCode(block, "TEXT", JS.ORDER_NONE) || "''";
      return `print(${msg});\n`;
    };
    JS["text_prompt_ext"] = function () {
      return ["readLine()", JS.ORDER_FUNCTION_CALL];
    };
  }
  function xmlToJS(xml) {
    const JS = getJSGenerator();
    if (!JS) throw new Error("找不到 JavaScript generator");
    patchGenerators(JS);

    // ✅ 相容不同版本/客製 Blockly：text_length1 -> text_length
    if (!Blockly.Blocks["text_length1"] && Blockly.Blocks["text_length"]) {
      Blockly.Blocks["text_length1"] = Blockly.Blocks["text_length"];
    }
    if (JS && !JS["text_length1"] && JS["text_length"]) {
      JS["text_length1"] = JS["text_length"];
    }

    const workspace = new Blockly.Workspace();

    let dom;
    if (Blockly.utils?.xml?.textToDom) dom = Blockly.utils.xml.textToDom(xml);
    else if (Blockly.Xml?.textToDom) dom = Blockly.Xml.textToDom(xml);
    else dom = new DOMParser().parseFromString(xml, "text/xml").documentElement;

    if (Blockly.Xml?.domToWorkspace) Blockly.Xml.domToWorkspace(dom, workspace);
    else if (Blockly.Xml?.appendDomToWorkspace) Blockly.Xml.appendDomToWorkspace(dom, workspace);
    else throw new Error("找不到 Blockly XML 匯入方法");

    // ★B版：在每個 statement 前插入 __tick()
    JS.STATEMENT_PREFIX = "__tick();\n";
    JS.addReservedWords("__tick");

    return JS.workspaceToCode(workspace);
  }

  // ===== UI helpers =====
  function setGreeting(me) {
    const nn = String(me?.nickname || "").trim();
    const email = String(me?.email || "").trim();
    const who = nn || email || "使用者";
    meEl.textContent = `${who} 您好，繼續一起努力吧！`;
    meEl.classList.remove("muted");
  }

  function showWait() {
    resultCard.style.display = "block";
    resultCard.className = "card wait";
    scoreEl.textContent = "⏳ 評分中，請稍候…";
    detailsEl.innerHTML = "";
  }

  function showError(msg) {
    resultCard.style.display = "block";
    resultCard.className = "card bad";
    scoreEl.textContent = "❌ " + msg;
    detailsEl.innerHTML = "";
  }

  function renderResult(data) {
    resultCard.style.display = "block";
    resultCard.className = (data.pass === data.total) ? "card ok" : "card bad";
    // ★B版：不顯示使用時間，改顯示步數
    const stepText = (typeof data.execSteps === "number")
      ? ` <span class="muted">（步數：${data.execSteps}）</span>`
      : "";
    scoreEl.innerHTML = `成績：<b>${data.pass}/${data.total}</b>${stepText}`;
    const lines = (data.results || []).map(r => {
      if (r.ok) return `<li class="ok">Case ${r.id}: 正確</li>`;
      if (r.error?.includes("__EXEC_STEP_LIMIT__")) return `<li class="bad">Case ${r.id}: 步數超限</li>`;
      if (r.error?.includes("OutputLimit")) return `<li class="bad">Case ${r.id}: 輸出過多</li>`;
      if (r.error?.includes("timed out")) return `<li class="bad">Case ${r.id}: 執行逾時</li>`;
      return `<li class="bad">Case ${r.id}: 錯誤</li>`;
    }).join("");
    detailsEl.innerHTML = `<ul>${lines}</ul>`;
  }

  // ===== load problems =====
  async function loadProblems() {
    problemSelect.disabled = true;
    fileInput.disabled = true;

    const resp = await fetch(`${BASE_URL}/problems`);
    const data = await resp.json();
    const list = data?.problems || [];
    if (!Array.isArray(list) || list.length === 0) throw new Error("找不到題目清單");

    problemSelect.innerHTML = list
      .map(p => `<option value="${p.id}">${p.name}（${p.total} 測試）</option>`)
      .join("");

    problemSelect.disabled = false;
    fileInput.disabled = false;
  }

  // ===== summary (right side) =====
  function pctFloor(pass, total) {
    const p = Number(pass ?? 0);
    const t = Number(total ?? 0);
    if (!t) return 0;
    return Math.floor((p / t) * 100);
  }

  function idToZoneAndLabel(problemId) {
    // 支援：p01..p99
    const m = String(problemId || "").match(/^p(\d{2})$/i);
    if (!m) return null;
    const n = parseInt(m[1], 10);

    // 第 1 區：1-1,1-2,1-3,1-6,1-7（依你現有題庫）
    if (n >= 1 && n <= 3) return { zone: 1, label: `1-${n}` };
    if (n === 6) return { zone: 1, label: "1-6" };
    if (n === 7) return { zone: 1, label: "1-7" };

    // 第 2 區：p08..p11 => 2-1..2-4
    if (n >= 8 && n <= 11) return { zone: 2, label: `2-${n - 7}` };

    // 第 3 區：p12..p15 => 3-1..3-4
    if (n >= 12 && n <= 15) return { zone: 3, label: `3-${n - 11}` };

    // 第 4 區：p16..p20 => 4-1..4-5
    if (n >= 16 && n <= 20) return { zone: 4, label: `4-${n - 15}` };

    // 第 5 區：p21.. => 5-1..（往後擴充照這個邏輯）
    if (n >= 21) return { zone: 5, label: `5-${n - 20}` };

    return null;
  }


  function colorClassByPct(pct) {
    if (pct >= 100) return "ok";
    if (pct >= 50) return "warn";
    return "bad";
  }

  async function loadMySummary() {
    const resp = await api("/my/summary");
    if (!resp.ok) {
      sideInfo.textContent = "（請先登入）";
      zone1.innerHTML = ""; zone2.innerHTML = ""; zone3.innerHTML = ""; zone4.innerHTML = ""; zone5.innerHTML = "";
      zone1Empty.style.display = "none"; zone2Empty.style.display = "none"; zone3Empty.style.display = "none";
      zone4Empty.style.display = "none"; zone5Empty.style.display = "none";
      return;
    }

    const data = await resp.json();
    const problems = data?.problems || [];
    sideInfo.textContent = `題目總數：${problems.length}`;

    const lists = { 1: [], 2: [], 3: [], 4: [], 5: [] };

    for (const p of problems) {
      const map = idToZoneAndLabel(p.id);
      if (!map) continue;

      const pct = pctFloor(p.pass, p.total);     // 無條件捨去整數
      const cls = colorClassByPct(pct);          // 100 綠 / 50-99 黃 / 0-49 紅
      const order = parseInt(map.label.split("-")[1], 10);

      lists[map.zone].push({
        order,
        html: `<li class="${cls}">${map.label} (${pct}%)</li>`
      });
    }

    // 排序 & 渲染
    for (const z of [1,2,3,4,5]) {
      lists[z].sort((a,b) => a.order - b.order);
    }

    zone1.innerHTML = lists[1].map(x => x.html).join("");
    zone2.innerHTML = lists[2].map(x => x.html).join("");
    zone3.innerHTML = lists[3].map(x => x.html).join("");
    zone4.innerHTML = lists[4].map(x => x.html).join("");
    zone5.innerHTML = lists[5].map(x => x.html).join("");

    zone1Empty.style.display = lists[1].length ? "none" : "block";
    zone2Empty.style.display = lists[2].length ? "none" : "block";
    zone3Empty.style.display = lists[3].length ? "none" : "block";
    zone4Empty.style.display = lists[4].length ? "none" : "block";
    zone5Empty.style.display = lists[5].length ? "none" : "block";
  }


  // ===== grade =====
  async function gradeXml(xmlText) {
    showWait();

    // ✅ 相容舊版 / 客製 Blockly：text_length1 → text_length
    xmlText = xmlText.replaceAll('type="text_length1"', 'type="text_length"');

    const code = xmlToJS(xmlText);
    const problemId = problemSelect.value;

    const resp = await api("/grade", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code, problemId })
    });

    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data?.error || "server error");

    renderResult(data);
    await loadMySummary(); // ✅ 評完立刻更新右側各題成績
  }

  // ===== login modal =====
  function openLogin() {
    loginMsg.textContent = "";
    modalBg.style.display = "flex";
    loginEmail.focus();
  }
  function closeLogin() {
    modalBg.style.display = "none";
  }

  btnLogin.addEventListener("click", openLogin);
  modalBg.addEventListener("click", (e) => {
    if (e.target === modalBg) closeLogin();
  });

  btnAdmin.addEventListener("click", () => {
    window.open("/admin.html", "_blank");
  });

  btnDoLogin.addEventListener("click", async () => {
    loginMsg.textContent = "登入中…";
    try {
      const email = loginEmail.value.trim();
      const password = loginPwd.value;
      const resp = await fetch(`${BASE_URL}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data?.error || "登入失敗");

      setToken(data.token);
      setGreeting(data);
      btnLogin.style.display = "none";
      btnChangePwd.style.display = "inline-block";
      btnLogout.style.display = "inline-block";
      setAdminUI(data.role);

      closeLogin();
      await loadProblems();
      await loadMySummary();
    } catch (e) {
      loginMsg.textContent = "❌ " + (e?.message || e);
    }
  });

  btnLogout.addEventListener("click", () => {
    clearToken();
    meEl.textContent = "尚未登入";
    meEl.classList.add("muted");
    btnLogin.style.display = "inline-block";
    btnChangePwd.style.display = "none";
    btnLogout.style.display = "none";
    btnAdmin.style.display = "none";
    sideInfo.textContent = "（請先登入）";
    zone1.innerHTML = "";
    zone2.innerHTML = "";
    zone1Empty.style.display = "none";
    zone2Empty.style.display = "none";
    problemSelect.disabled = true;
    fileInput.disabled = true;
    showError("已登出");
  });

  // 選檔後自動評分
  fileInput.addEventListener("change", async (ev) => {
    const f = ev.target.files?.[0];
    if (!f) return;

    try {
      const xmlText = await f.text();
      await gradeXml(xmlText);
    } catch (e) {
      showError("評分失敗：" + (e?.message || e));
    } finally {
      fileInput.value = "";
    }
  });

  // ===== startup =====
  (async () => {
    const token = getToken();
    if (token) {
      const r = await api("/auth/me");
      if (r.ok) {
        const me = await r.json();
        setGreeting(me);
        btnLogin.style.display = "none";
        btnChangePwd.style.display = "inline-block";
        btnLogout.style.display = "inline-block";
        setAdminUI(me.role);

        await loadProblems();
        await loadMySummary();
        return;
      } else {
        clearToken();
      }
    }
    // 未登入狀態
    problemSelect.disabled = true;
    fileInput.disabled = true;
    sideInfo.textContent = "（請先登入）";
  })();
</script>

</body>
</html>
