name: Trigger Core Grader Queue

# 💡 聽從指令：只要有人建立標題是 [SUBMIT] 開頭的 Issue，立刻開機！
on:
  issues:
    types: [opened]

jobs:
  handle_submission:
    # 確保只有標題帶有 [SUBMIT] 的 Issue 才會觸發代筆，防止亂入
    if: startsWith(github.event.issue.title, '[SUBMIT]')
    runs-on: ubuntu-latest
    steps:
      # 1. 移駕到公開端倉庫
      - name: Checkout Public Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CORE_DISPATCH_TOKEN }}

      # 2. 🤖 機器人代筆：讀取 Issue 的內文，直接在後台實體寫成 JSON 檔案
      - name: Create Submission File from Issue Body
        run: |
          mkdir -p queue
          TIMESTAMP=$(date +%s)
          
          # 從 Issue 標題解出學號與題號，建立唯一檔名
          # 標題格式：[SUBMIT] std01 - p01
          CLEAN_TITLE=$(echo "${{ github.event.issue.title }}" | sed 's/\[SUBMIT\] //')
          USER_ID=$(echo "$CLEAN_TITLE" | cut -d'-' -f1 | xargs)
          PROB_ID=$(echo "$CLEAN_TITLE" | cut -d'-' -f2 | xargs)
          
          FILENAME="queue/${USER_ID}_${PROB_ID}_${TIMESTAMP}.json"
          
          # 直接把 Issue 內文（原本網頁打包的 JSON）轉存成實體檔案
          cat << 'EOF' > $FILENAME
          ${{ github.event.issue.body }}
          EOF
          
          # 自動提交存檔進 queue/
          git config --global user.name "UnoJudge-Uploader"
          git config --global user.email "uploader@unojudge.local"
          git add $FILENAME
          git commit -m "system: robotic data upload from issue for ${USER_ID}"
          git push origin main

      # 3. 🔒 隱密銷毀：把這個用來當信號彈的 Issue 自動關閉並鎖定，不留下任何公開痕跡
      - name: Close and Lock Issue
        run: |
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}
          gh issue lock ${{ github.event.issue.number }} --repo ${{ github.repository }} --reason "resolved"
        env:
          GH_TOKEN: ${{ secrets.CORE_DISPATCH_TOKEN }}

      # 4. 🚀 叫醒私密端的評分大腦開機！
      - name: Notify Private Core Repo to Grade
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.CORE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/ka2515/unojudge-core/dispatches \
            -d '{"event_type": "new_submission"}'